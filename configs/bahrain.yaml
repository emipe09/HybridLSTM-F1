target_gp_name: "Bahrain Grand Prix"
data_dir: "Data"
model_data_dir: "Scripts/ModelData"
results_dir: "Scripts/Results"
cleaned_data_filename_template: "{safe_gp_name}_cleaned_data.csv"
xgb_params_subdir: "xgboost/sw/params"
xgb_params_filename_template: "{safe_gp_name}_xgb_params_sw.json"
xgb_models_subdir: "xgboost/sw/models"
xgb_model_filename_template: "{safe_gp_name}_xgb_model_sw.json"
xgb_model_metadata_filename_template: "{safe_gp_name}_xgb_model_sw_metadata.json"
lr_models_subdir: "linear_regression/sw/models"
lr_model_filename_template: "{safe_gp_name}_lr_model_sw.pkl"
lr_model_metadata_filename_template: "{safe_gp_name}_lr_model_sw_metadata.json"
lstm_models_subdir: "lstm/models"
lstm_model_filename_template: "{safe_gp_name}_lstm_model.keras"
lstm_model_metadata_filename_template: "{safe_gp_name}_lstm_model_metadata.json"
target_col: "LapTime_seconds"
lap_col: "LapNumber"
numerical_features: [TyreLife, LapNumber, Humidity_RBF_Median, Pressure_RBF_Median, TrackTemp_RBF_Median, WindSpeed_RBF_Median, Year, TempDelta_RBF_Median, LapTime_prev]
categorical_features: [Driver, Team, pirelliCompound]
holdout_ratio: 0.20
window_ratio: 0.20
window_train_ratio: 0.80
window_step_ratio: 0.20
alpha_cos: 0.50
beta_cos: 0.50
random_seed: 42
lstm_units: 32
lstm_dense_units: 16
lstm_dropout: 0.10
lstm_recurrent_dropout: 0.00
lstm_learning_rate: 0.0001
lstm_batch_size: 16
lstm_epochs: 80
lstm_patience: 12
lstm_l2_reg: 0.0001
lstm_year_weight_scale: 1.0
lstm_reduce_lr_factor: 0.50
lstm_reduce_lr_patience: 4
lstm_min_learning_rate: 0.00001
lstm_tuning_enabled: true
lstm_optuna_trials: 20
lstm_tuning_epochs: 80
lstm_tuning_patience: 10
lstm_min_final_epochs: 10
lstm_group_cols: [Year, Driver]
optuna_trials: 100
use_saved_xgb_params: true
use_saved_lstm_params: false
xgb_optuna_sampler: "tpe"
xgb_learning_rate_min: 0.006667
xgb_learning_rate_max: 0.300
xgb_max_depth_min: 1
xgb_max_depth_max: 7
xgb_min_child_weight_min: 4
xgb_min_child_weight_max: 6
xgb_subsample_min: 0.678
xgb_subsample_max: 0.872
xgb_colsample_bytree_min: 0.722
xgb_colsample_bytree_max: 0.928
xgb_gamma_min: 0.0
xgb_gamma_max: 0.700
xgb_reg_alpha_min: 0.000333
xgb_reg_alpha_max: 0.0300
xgb_reg_lambda_min: 0.167
xgb_reg_lambda_max: 3.000
mlflow_enabled: true
mlflow_tracking_uri: "Scripts/Results/mlruns"
mlflow_experiment_name: "f1-lap-time-{safe_gp_name}"
# Expanding-window model artifacts
ew_xgb_params_subdir: "xgboost/ew/params"
ew_xgb_params_filename_template: "{safe_gp_name}_xgb_params_ew.json"
ew_xgb_models_subdir: "xgboost/ew/models"
ew_xgb_model_filename_template: "{safe_gp_name}_xgb_model_ew.json"
ew_xgb_model_metadata_filename_template: "{safe_gp_name}_xgb_model_ew_metadata.json"
ew_lr_models_subdir: "linear_regression/ew/models"
ew_lr_model_filename_template: "{safe_gp_name}_lr_model_ew.pkl"
ew_lr_model_metadata_filename_template: "{safe_gp_name}_lr_model_ew_metadata.json"
lstm_params_subdir: "lstm/params"
lstm_params_filename_template: "{safe_gp_name}_lstm_params.json"
lstm_trials_filename_template: "{safe_gp_name}_lstm_optuna_trials.csv"
lstm_window_ratio: 0.20
# Window size sweep configuration
window_size_sweep_min: 0.05
window_size_sweep_max: 0.55
window_size_sweep_step: 0.05
window_sweep_results_dir: "Scripts/Results/window_sweep"
window_sweep_results_filename_template: "{safe_gp_name}_window_sweep_results.csv"
# Per-model selected window ratios from window-size sensitivity sweep
lr_ew_window_ratio: 0.05
xgb_ew_window_ratio: 0.30
